$kind: http-request
url: https://nameday.abalin.net/api/V2/date
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "day": 30,
      "month": 22
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |
      let jsonData = pm.response.json();

      pm.test("Statuscode is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Error message is correct", function () {
          pm.expect(jsonData.message).to.eql("missing or invalid parameters");
      });

      pm.test("Response time is fast", function () {
          pm.expect(pm.response.responseTime).to.be.below(250);
      });
    language: text/javascript
order: 6000
