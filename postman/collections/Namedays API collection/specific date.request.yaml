$kind: http-request
url: https://nameday.abalin.net/api/V2/date
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "day": {{day}},
      "month": {{month}}
    }
auth:
  type: noauth
scripts:
  - type: beforeRequest
    code: |-
      let randomDay = Math.floor(Math.random() * 31) + 1;
      let randomMonth = Math.floor(Math.random() * 12) + 1;

      pm.collectionVariables.set("day", randomDay);
      pm.collectionVariables.set("month", randomMonth);
    language: text/javascript
  - type: afterResponse
    code: >
      let jsonData = pm.response.json();

      let month = pm.collectionVariables.get("month");

      let day = pm.collectionVariables.get("day");

      let monthFull = month < 10 ? "0" + month : "" + month;

      let dayFull = day < 10 ? "0" + day : "" + day;



      pm.test("Statuscode is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Message is correct", function () {
          pm.expect(jsonData.message).to.contain("Namedays for " + monthFull + "-" + dayFull);
      });


      pm.test("Data contains at least one country", function () {
          pm.expect(Object.keys(jsonData.data).length).to.be.greaterThan(0);
      });


      pm.test("Data has exactly 20 elements", function () {
          pm.expect(Object.keys(jsonData.data).length).to.equal(20);
      });


      pm.test("Response time is fast", function () {
          pm.expect(pm.response.responseTime).to.be.below(250);
      });
    language: text/javascript
order: 3000
