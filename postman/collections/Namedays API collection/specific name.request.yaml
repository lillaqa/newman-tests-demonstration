$kind: http-request
url: https://nameday.abalin.net/api/V2/getname
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "name": "{{name-common}}"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      let jsonData = pm.response.json();
      let name = pm.collectionVariables.get("name-common")

      pm.test("Statuscode is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Message is Namedays for name Rita", function () {
          pm.expect(jsonData.message).to.eql("Namedays for name " + name);
      });

      pm.test("Data contains at least 1 country", function () {
          pm.expect(jsonData.data.length).to.be.at.least(1);

      });

      pm.test("country is not null or empty", function () {
          pm.expect(jsonData.data[0].country).to.not.be.null;
          pm.expect(jsonData.data[0].country).to.not.be.empty;
      });

      pm.test("Validate data structure", function () {
          pm.expect(jsonData.data).to.be.an('array');
          pm.expect(jsonData.data[0]).to.have.property('country');
          pm.expect(jsonData.data[0]).to.have.property('0');
          pm.expect(jsonData.data[0]['0']).to.have.property('day');
          pm.expect(jsonData.data[0]['0']).to.have.property('month');
          pm.expect(jsonData.data[0]['0']).to.have.property('name');
      });

      pm.test("Validate day is a number", function () {
          pm.expect(jsonData.data[0]['0'].day).to.be.a('number');
      });

      pm.test("Validate month is a number", function () {
          pm.expect(jsonData.data[0]['0'].month).to.be.a('number');
      });

      pm.test("Validate name is a string", function () {
          pm.expect(jsonData.data[0]['0'].name).to.be.a('string');
      });
    language: text/javascript
order: 4000
