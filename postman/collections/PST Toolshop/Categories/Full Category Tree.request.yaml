$kind: http-request
name: Full Category Tree
url: "{{baseURL}}/categories/tree"
method: GET
scripts:
  - type: afterResponse
    code: |-
      let jsonData = pm.response.json();

      pm.test("Statuscode is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Data contains at least one country", function () {
          pm.expect(Object.keys(jsonData).length).to.be.greaterThan(0);
      });


      pm.test("Response time is fast", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      if (jsonData.length > 0) {
          const secondItem = jsonData[1];
          pm.environment.set("categoryID", secondItemItem.id);
          pm.collectionVariables.set("tempCatName", secondItem.name);
      }
    language: text/javascript
order: 1000
