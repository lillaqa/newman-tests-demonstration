$kind: http-request
name: All Brands
url: "{{baseURL}}/brands"
method: GET
scripts:
  - type: afterResponse
    code: |-
      let jsonData = pm.response.json();

      pm.test("Statuscode is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Data contains at least one country", function () {
          pm.expect(Object.keys(jsonData).length).to.be.greaterThan(0);
      });


      pm.test("Response time is fast", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      if (jsonData.length > 0) {
          const firstItem = jsonData[0];
          pm.environment.set("brandID", firstItem.id);
          pm.collectionVariables.set("tempBrandName", firstItem.name);
      }
    language: text/javascript
order: 1000
