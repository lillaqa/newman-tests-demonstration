$kind: http-request
name: Specific Brand
url: "{{baseURL}}/brands/{{brandID}}"
method: GET
scripts:
  - type: afterResponse
    code: |
      let jsonData = pm.response.json();

      pm.test("Statuscode is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Data contains at least one country", function () {
          pm.expect(Object.keys(jsonData).length).to.be.equal(3);
      });


      pm.test("Response time is fast", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });
    language: text/javascript
order: 2000
