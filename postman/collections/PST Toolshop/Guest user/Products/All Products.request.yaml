$kind: http-request
name: All Products
url: "{{baseURL}}/products"
method: GET
scripts:
  - type: afterResponse
    code: |-
      let jsonData = pm.response.json();

      pm.test("Statuscode is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Data contains at least one country", function () {
          pm.expect(Object.keys(jsonData.data).length).to.be.greaterThan(0);
      });


      pm.test("Response time is fast", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      if (jsonData.length > 2) {
          const thirdItem = jsonData[1];
          pm.environment.set("productID", thirdItem.id);
          pm.collectionVariables.set("tempProdName", thirdItem.name);
      }
    language: text/javascript
order: 1000
